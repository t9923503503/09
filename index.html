<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="description" content="Двойной турнир выбывания с рассчётом True Skill Index">
  <title>Tournament Bracket — Double Elimination</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/roster.css">
  <link rel="stylesheet" href="assets/css/bracket.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🏆</text></svg>">

  <style>
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d0d1a;
      color: #e8e8f0;
      font-size: 1.2em;
      gap: 10px;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #FFD700;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app-loading" id="appLoading">
    <div class="spinner"></div>
    <span>Loading Tournament App...</span>
  </div>

  <!-- Core modules -->
  <script src="doubleElimPlugin.js"></script>
  <script src="assets/js/core/event-emitter.js"></script>
  <script src="assets/js/modules/localization.js"></script>
  <script src="assets/js/modules/persistence.js"></script>
  <script src="assets/js/modules/roster-manager.js"></script>

  <!-- Main application -->
  <script src="assets/js/app.js"></script>

  <script>
    // Hide loading spinner once app is ready
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('appLoading');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.style.display = 'none', 300);
        }
      }, 800);
    });
  </script>
</body>
</html>
